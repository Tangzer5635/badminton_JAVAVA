spring:
  application:
    name: badminton

  shell:
    interactive:
      enabled: true

  batch:
    job:
      enabled: false


  datasource:
    url: jdbc:postgresql://localhost:5432/db_badminton
    username: postgres
    password: azerty+35
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate.jdbc.batch_size: 100
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.jdbc.batch_versioned_data: true

logging:
  level:
    org.hibernate.stat: DEBUG

shell:
  out:
    info: CYAN
    success: GREEN
    error: RED
    warning: YELLOW